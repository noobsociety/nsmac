name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Repository tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history: seal-render-git-state derives a committed-deletion
          # fixture from `git log`; a shallow clone hides it.
          fetch-depth: 0
      - name: Test
        run: ./tests/run.sh
